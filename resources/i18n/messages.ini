FILE_UPLOAD_VULNERABILITY_DEFINITION='Uploaded files represent a significant risk to applications. The first step in many attacks is to get some code to the system to be attacked. Then the attack only needs to find a way to get the code executed.
<br/>The consequences of unrestricted file upload can vary, including complete system takeover, an overloaded file system or database, forwarding attacks to back-end systems, client-side attacks, or simple defacement. It depends on what the application does with the uploaded file and especially where it is stored.
<br/><br/>
Important Links:<br/>
<ol> <li> <a href="https://owasp.org/www-community/vulnerabilities/Unrestricted_File_Upload" target="_blank">Owasp Wiki Link</a>  
 <li> <a href="https://www.youtube.com/watch?v=CmF9sEyKZNo" target="_blank">Ebrahim Hegazy talk on Unrestricted File Uploads</a> 
 <li> <a href="https://www.sans.org/blog/8-basic-rules-to-implement-secure-file-uploads/" target="_blank">Sans rules to implement secure file uploads</a> 
</ol>'
MAGIC_HASH_VULNERABILITY_DEFINITION='Magic hash exploitation demonstrates how loose comparison can bypass authentication when hash outputs look numeric (for example values like 0e...).
<br/>In PHP, using == for hash checks can trigger type juggling and produce false-positive matches.
<br/><br/>
Important Links:<br/>
<ol>
 <li><a href="https://owasp.org/www-community/vulnerabilities/PHP_Type_Juggling" target="_blank">OWASP - PHP Type Juggling</a></li>
 <li><a href="https://cwe.mitre.org/data/definitions/704.html" target="_blank">CWE-704: Incorrect Type Conversion or Cast</a></li>
 <li><a href="https://www.php.net/manual/en/function.hash-equals.php" target="_blank">PHP Manual - hash_equals</a></li>
</ol>'
